<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ALPHA | Multi‑Link Product Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f4f8fe 0%, #e9eff5 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      padding: 1.5rem;
      color: #1a2c3e;
    }

    /* main card container */
    .page-container {
      max-width: 1280px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.22), 0 2px 8px rgba(0, 0, 0, 0.02);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* ----- HEADER: left back + centre ALPHA ----- */
    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      background: #ffffffec;
      backdrop-filter: blur(2px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .back-btn-wrapper {
      flex: 1;
      display: flex;
      justify-content: flex-start;
    }

    .back-btn {
      background: #f0f3f8;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #1e4663;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      background: #f0f4f9;
      border: 1px solid #e2e8f0;
    }

    .back-btn:hover {
      background: #e6edf5;
      transform: translateX(-3px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      border-color: #cbdde9;
    }

    .back-btn:active {
      transform: translateX(0px);
    }

    .brand-center {
      flex: 2;
      text-align: center;
    }

    .brand-alpha {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #0b2b3f, #1f6392);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 3px rgba(0,0,0,0.02);
    }

    .right-placeholder {
      flex: 1;
      visibility: hidden;
    }

    @media (max-width: 620px) {
      .header-bar { padding: 1rem 1.2rem; }
      .brand-alpha { font-size: 1.5rem; }
      .back-btn { padding: 0.45rem 1.1rem; font-size: 0.9rem; }
    }

    /* ----- PRODUCT GRID (image + details) ----- */
    .product-core {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem 2rem 1.8rem 2rem;
      align-items: start;
    }

    .slide-image-area {
      background: #fefefe;
      border-radius: 1.75rem;
      overflow: hidden;
      box-shadow: 0 18px 30px -12px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s;
    }

    .slide-image-area:hover {
      transform: scale(1.01);
    }

    .product-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      aspect-ratio: 1 / 0.95;
      background: #fafcff;
    }

    .slide-badge {
      display: inline-block;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      margin: 0.8rem 0 0 1rem;
    }

    .product-details {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .product-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(125deg, #1F3B4C, #0F4C6B);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    .description-text {
      color: #2c4b66;
      font-size: 1rem;
      border-left: 3px solid #2c9bcf;
      padding-left: 1rem;
      background: #f6faff;
      border-radius: 0 12px 12px 0;
    }

    /* price row + off% */
    .price-off-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 1rem;
      background: #f0f5fa;
      padding: 0.8rem 1.2rem;
      border-radius: 1.5rem;
    }

    .current-price {
      font-size: 2rem;
      font-weight: 800;
      color: #1c6e43;
    }

    .old-price {
      font-size: 1.2rem;
      color: #6f8eaa;
      text-decoration: line-through;
      font-weight: 500;
    }

    .discount-badge {
      background: #e53e3e;
      color: white;
      font-weight: 700;
      padding: 0.25rem 0.9rem;
      border-radius: 60px;
      font-size: 0.85rem;
      box-shadow: 0 2px 6px rgba(229, 62, 62, 0.3);
    }

    /* line breaker + DETAIL */
    .linebreaker-detail {
      margin: 0.5rem 0 0.2rem;
    }

    hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, #cbdbe0, #9cb4cf, #cbdbe0);
      margin: 0.8rem 0 1rem 0;
      border-radius: 4px;
    }

    .detail-content {
      background: #fafdff;
      padding: 1rem 1.2rem;
      border-radius: 1.25rem;
      border: 1px solid #e2edf7;
    }

    .detail-content h4 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #0e4b6e;
    }

    .detail-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
    }

    .detail-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      background: #eef3fc;
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      color: #1f5985;
      font-weight: 500;
    }

    .detail-list li::before {
      content: "⚡";
      font-size: 0.85rem;
    }

    /* TWO BIGGER BUTTONS (BUY NOW + VIEW DEMO) */
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    .btn-big {
      flex: 1 1 auto;
      text-align: center;
      padding: 1rem 1.6rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      letter-spacing: 0.5px;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .btn-buy {
      background: linear-gradient(105deg, #0f4c2d, #1c784b);
      box-shadow: 0 10px 18px -8px rgba(28, 120, 75, 0.4);
    }

    .btn-buy:hover {
      background: linear-gradient(105deg, #0a3e25, #166a41);
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2);
    }

    .btn-demo {
      background: linear-gradient(105deg, #2c5282, #1e6f9f);
      box-shadow: 0 10px 18px -8px rgba(30, 111, 159, 0.4);
    }

    .btn-demo:hover {
      background: linear-gradient(105deg, #1f446b, #155b86);
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2);
    }

    .btn-big:active {
      transform: translateY(1px);
    }

    /* responsive */
    @media (max-width: 860px) {
      .product-core {
        grid-template-columns: 1fr;
        gap: 1.8rem;
        padding: 1.5rem;
      }
      .slide-image-area {
        max-width: 550px;
        margin: 0 auto;
        width: 100%;
      }
      .action-buttons {
        flex-direction: row;
      }
    }

    @media (max-width: 550px) {
      body { padding: 0.8rem; }
      .product-core { padding: 1.2rem; }
      .btn-big { padding: 0.8rem 1rem; font-size: 1rem; }
      .current-price { font-size: 1.6rem; }
      .brand-alpha { font-size: 1.3rem; }
      .back-btn { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
    }

    .detail-list li:nth-child(odd)::before { content: "🔹"; }
    .detail-list li:nth-child(even)::before { content: "🔸"; }

    footer {
      text-align: center;
      font-size: 0.7rem;
      padding: 1rem;
      border-top: 1px solid #e2eef9;
      color: #7e95ab;
    }
  </style>
</head>
<body>
<div class="page-container">
  <!-- HEADER: LEFT BACK BUTTON + CENTRE ALPHA -->
  <div class="header-bar">
    <div class="back-btn-wrapper">
      <button class="back-btn" id="customBackBtn">← BACK</button>
    </div>
    <div class="brand-center">
      <span class="brand-alpha">ALPHA</span>
    </div>
    <div class="right-placeholder"> </div>
  </div>

  <!-- MAIN BODY: ONE SLIDE IMAGE + DESCRIPTION + PRICE & OFF% + LINE BREAKER DETAIL + 2 BIG BUTTONS -->
  <div class="product-core">
    <!-- left: slide image area -->
    <div class="slide-image-area">
      <img class="product-img" 
           src="./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg" 
           alt="Alpha flagship headset - premium design"
           loading="eager">
      <div style="padding: 0.3rem 0 0.8rem 1rem;">
        <span class="slide-badge"></span>
      </div>
    </div>

    <!-- right: product details -->
    <div class="product-details">
      <div class="product-title">
        SUMIT<span style="font-weight:500;"> sir</span> 
      </div>
      <div class="description-text">
        Best teacher with, the tecaching exerpince of 5+ years.
      </div>

      <!-- price + off% block -->
      <div class="price-off-row">
        <span class="current-price">RS- 139.99</span>
        <span class="old-price">RS- 219.99</span>
        <span class="discount-badge">36% OFF</span>
      </div>
      <div style="font-size: 0.85rem; color: #357a5e; font-weight: 500;">✨ You save RS- 80 + free shipping ✨</div>

      <!-- LINE BREAKER WITH DETAIL (exactly hr + detailed content) -->
      <div class="linebreaker-detail">
        <hr>
        <div class="detail-content">
          <h4>📋 Alpha Study — DETAILS</h4>
          <ul class="detail-list">
            <li>##</li>
            <li>##</li>
            <li>##</li>
            <li>##</li>
            <li>##</li>
            <li>##</li>
          </ul>
          <p style="font-size: 0.85rem; margin-top: 0.7rem; color: #3b6d8c;">✔️ Don't miss out on this incredible opportunity!</p>
        </div>
      </div>

      <!-- 2 BIGGER BUTTONS: BUY NOW & VIEW DEMO (each with custom redirect) -->
      <div class="action-buttons">
        <button class="btn-big btn-buy" id="buyNowBtn">🛒 BUY NOW</button>
        <button class="btn-big btn-demo" id="viewDemoBtn">🎬 VIEW DEMO</button>
      </div>
    </div>
  </div>
  <footer>
    
  </footer>
</div>

<script>
  // ============================================================
  // 🔥 CUSTOM REDIRECT LINKS FOR EACH BUTTON 🔥
  // Modify the URLs below to set your own destination for every button.
  // ============================================================

  // 1) LEFT SIDE BACK BUTTON redirect (custom)
  const BACK_REDIRECT_URL = "./undercourses.html";   // ← change your back link
  
  // 2) BUY NOW button redirect (custom)
  const BUY_REDIRECT_URL = "./undercourses.html";    // ← direct checkout / cart
  
  // 3) VIEW DEMO button redirect (custom)
  const DEMO_REDIRECT_URL = "./undercourses.html"; // ← product demo / video tour

  // ----- apply redirects without any popups (direct navigation) -----
  
  // BACK BUTTON (left side)
  const backBtn = document.getElementById('customBackBtn');
  if (backBtn) {
    backBtn.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = BACK_REDIRECT_URL;
    });
  }

  // BUY NOW BUTTON (bigger button)
  const buyBtn = document.getElementById('buyNowBtn');
  if (buyBtn) {
    buyBtn.addEventListener('click', () => {
      window.location.href = BUY_REDIRECT_URL;
    });
  }

  // VIEW DEMO BUTTON (bigger button)
  const demoBtn = document.getElementById('viewDemoBtn');
  if (demoBtn) {
    demoBtn.addEventListener('click', () => {
      window.location.href = DEMO_REDIRECT_URL;
    });
  }

  // Optional console log to show active custom links (no extra UI impact)
  console.log("✅ Custom redirects active:\n🔙 Back → " + BACK_REDIRECT_URL + "\n🛒 Buy Now → " + BUY_REDIRECT_URL + "\n🎬 View Demo → " + DEMO_REDIRECT_URL);
</script>
</body>
</html>
