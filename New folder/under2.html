<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CourseHub | Interactive Courses — Clickable Images with Custom Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f6f9fc;
      font-family: system-ui, 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      line-height: 1.5;
      color: #1e293b;
      scroll-behavior: smooth;
      padding: 2rem 1.5rem 4rem 1.5rem;
    }

    /* fixed back button (top-left) */
    .back-btn-fixed {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      padding: 0.7rem 1.3rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      color: #0f172a;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
      z-index: 1000;
      border: 1px solid rgba(0, 0, 0, 0.05);
      font-family: inherit;
    }

    .back-btn-fixed:hover {
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      border-color: #cbd5e1;
    }

    .back-icon {
      font-size: 1.3rem;
      line-height: 1;
      display: inline-block;
    }

    .page-header {
      text-align: center;
      margin: 0.5rem 0 2.5rem 0;
    }

    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1E2A3E, #0f2b3d);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
    }

    .page-header p {
      color: #475569;
      margin-top: 0.5rem;
      font-size: 1.05rem;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .course-card {
      background: #ffffff;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02);
      transition: transform 0.25s ease, box-shadow 0.35s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
      will-change: transform;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .courses-grid.loaded .course-card {
      opacity: 1;
      transform: translateY(0);
    }

    .course-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.1);
    }

    /* image link wrapper (clickable area) */
    .image-link {
      display: block;
      text-decoration: none;
      outline: none;
      cursor: pointer;
      line-height: 0;
      overflow: hidden;
      background-color: #eef2f6;
    }

    .card-img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
      background-color: #eef2f6;
    }

    .course-card:hover .card-img {
      transform: scale(1.02);
    }

    .card-content {
      padding: 1.5rem 1.3rem 1.6rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .course-title {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.65rem;
      color: #0f172a;
    }

    .course-description {
      font-size: 0.9rem;
      color: #334155;
      margin-bottom: 1rem;
      line-height: 1.45;
      display: -webkit-box;
       -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .course-price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #0f3b5c;
      margin-bottom: 1.3rem;
      letter-spacing: -0.01em;
    }

    .course-price span {
      font-size: 0.9rem;
      font-weight: 500;
      color: #5b6e8c;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: auto;
    }

    .btn {
      flex: 1 0 auto;
      text-align: center;
      padding: 0.75rem 0.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
      display: inline-block;
      border: 1px solid transparent;
      background: transparent;
      letter-spacing: 0.01em;
    }

    .btn-details {
      background: #f1f5f9;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }

    .btn-details:hover {
      background: #e6edf4;
      transform: scale(1.02);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
      border-color: #cbd5e1;
    }

    @media (max-width: 768px) {
      body {
        padding: 1.5rem 1rem 3rem 1rem;
      }
      .back-btn-fixed {
        top: 1rem;
        left: 1rem;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }
      .page-header h1 {
        font-size: 1.8rem;
      }
      .courses-grid {
        gap: 1.5rem;
      }
      .button-group {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        padding: 0.8rem 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .course-title {
        font-size: 1.2rem;
      }
      .course-price {
        font-size: 1.4rem;
      }
      .card-content {
        padding: 1.2rem;
      }
    }

    img {
      max-width: 100%;
      display: block;
    }

    a, button {
      transition: all 0.2s;
    }
  </style>
</head>
<body>

<!-- ========== FIXED BACK BUTTON – CUSTOMIZE YOUR LINK HERE ========== -->
<a href="./INDEX.html" class="back-btn-fixed" id="backButton">
  <span class="back-icon">←</span> Back
</a>
<!-- 
  🔧 TO CHANGE BACK BUTTON LINK: replace href="./ind2.html" with your own URL.
-->

<div class="page-header">
  <h1>Alpha</h1>
  <p>Click on any course image → instant redirect (custom link per course)</p>
</div>

<div class="courses-grid" id="coursesGridContainer"></div>

<script>
  // ======================================================================
  // 📌 COURSE DATA – FULLY CUSTOMIZABLE IMAGES + CLICKABLE IMAGE LINKS
  // ======================================================================
  // ✅ NEW FEATURE: "imageLink" – set custom redirect when clicking on course image.
  //    If "imageLink" is provided, clicking the image will open that URL.
  //    If not provided, it falls back to the "detailsLink" (same as View Details button).
  //    If both are missing or empty, the image will not be clickable.
  //
  // ✅ HOW TO USE:
  //    Add "imageLink": "https://your-destination.com/custom-page" inside any course object.
  //    Example:
  //        {
  //          title: "NUTRITION",
  //          imageLink: "./special-nutrition-guide.html",
  //          detailsLink: "./nutrition-chapter1.html"
  //        }
  //
  // ✅ IMAGE REPLACEMENT: use "imageUrl" field to set custom course thumbnail.
  //    (supports absolute/relative paths, external URLs)
  //
  // ✅ All existing fields (title, description, price, detailsLink) remain fully functional.
  // ======================================================================

  const coursesData = [
    {
      title: "NUTRITION",
      description: "Nutrition Chapter 1 – complete dietary fundamentals & meal planning.",
      price: "RS- 799.00",
      imgId: "100",
      // 🖼️ custom thumbnail (local image)
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      // 🔗 CUSTOM IMAGE LINK: when user clicks the image, goes to detailed nutrition guide
      imageLink: "./nutrition-special.html",
      detailsLink: "./play1.html"
    },
    {
      title: "Full Stack JavaScript",
      description: "Node.js, Express, MongoDB, GraphQL. Deploy full‑stack apps with JWT authentication.",
      price: "$99.00",
      imgId: "20",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      // imageLink not defined → will reuse detailsLink (if available) or fallback
      imageLink: "./js-fullstack-overview.html",
      detailsLink: "./play2.html"
    },
    {
      title: "Python for Data Science",
      description: "Pandas, NumPy, Matplotlib, Seaborn, and intro to ML. Hands-on real datasets.",
      price: "$89.50",
      imgId: "33",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      // custom image link pointing to detailed data science module
      imageLink: "./data-science-advanced.html",
      detailsLink: "./play3.html"
    },
    {
      title: "UI/UX Design Pro",
      description: "Figma, prototyping, user research, design systems. Portfolio-ready projects.",
      price: "$69.99",
      imgId: "44",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      // custom image link separate from details button
      imageLink: "./uiux-showcase.html",
      detailsLink: "./play4.html"
    },
    {
      title: "DevOps with Kubernetes",
      description: "Docker, K8s, CI/CD pipelines, AWS EKS, monitoring with Prometheus.",
      price: "$119.00",
      imgId: "55",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./devops-k8s-deepdive.html",
      detailsLink: "./play5.html"
    },
    {
      title: "Mobile App Development (React Native)",
      description: "Cross-platform apps, native features, Expo, and App Store deployment.",
      price: "$84.99",
      imgId: "66",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./reactnative-masterclass.html",
      detailsLink: "./play6.html"
    },
    {
      title: "Cloud Computing (AWS)",
      description: "EC2, S3, Lambda, serverless, cloud architecture and cost optimization.",
      price: "$109.00",
      imgId: "77",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./aws-certification-prep.html",
      detailsLink: "./play7.html"
    },
    {
      title: "Blockchain Fundamentals",
      description: "Solidity, smart contracts, Web3.js, DeFi basics and NFT marketplace.",
      price: "$94.50",
      imgId: "88",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./blockchain-web3-workshop.html",
      detailsLink: "./play8.html"
    },
    {
      title: "Artificial Intelligence & ML",
      description: "TensorFlow, scikit-learn, neural networks, computer vision basics.",
      price: "$129.00",
      imgId: "99",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./ai-ml-practical.html",
      detailsLink: "./play9.html"
    },
    {
      title: "Cybersecurity Essentials",
      description: "Network security, cryptography, ethical hacking, risk management.",
      price: "$74.99",
      imgId: "101",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./cyber-defense-lab.html",
      detailsLink: "./play10.html"
    },
    {
      title: "Digital Marketing Strategy",
      description: "SEO, Google Ads, content marketing, analytics, and growth hacking.",
      price: "$59.99",
      imgId: "102",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      imageLink: "./marketing-blueprint.html",
      detailsLink: "./play11.html"
    },
    {
      title: "Product Management",
      description: "Agile, roadmaps, user stories, metrics, and product lifecycle.",
      price: "$89.00",
      imgId: "103",
      imageUrl: "./WhatsApp Image 2026-04-08 at 8.06.41 PM.jpeg",
      // example: imageLink and detailsLink can be different
      imageLink: "./pm-roadmap-tools.html",
      detailsLink: "./play12.html"
    }
  ];

  /**
   * Get final image URL for a course.
   * Priority: custom imageUrl (if provided and non-empty) → fallback to picsum based on imgId.
   * @param {Object} course - course object containing imageUrl and imgId
   * @returns {string} valid image URL
   */
  function getCourseImage(course) {
    if (course.imageUrl && typeof course.imageUrl === 'string' && course.imageUrl.trim() !== "") {
      return course.imageUrl.trim();
    }
    let fallbackId = course.imgId && course.imgId.toString().trim() !== "" ? course.imgId : "100";
    fallbackId = String(fallbackId).replace(/\s/g, '');
    return `https://picsum.photos/id/${fallbackId}/500/280`;
  }

  /**
   * Get the redirect link for the course image.
   * Priority: custom imageLink (if provided & non-empty) → detailsLink → null (non-clickable)
   * @param {Object} course 
   * @returns {string|null} valid URL or null if no link should be used
   */
  function getImageRedirectLink(course) {
    // 1️⃣ explicit imageLink from course data (highest priority)
    if (course.imageLink && typeof course.imageLink === 'string' && course.imageLink.trim() !== "") {
      const link = course.imageLink.trim();
      // ignore if it's just "#" or "javascript:void(0)" but still allow if it's a real path
      if (link !== "#" && link !== "javascript:void(0)") {
        return link;
      }
    }
    // 2️⃣ fallback: use detailsLink (if exists and not empty / not "#" placeholder)
    if (course.detailsLink && typeof course.detailsLink === 'string' && course.detailsLink.trim() !== "") {
      const details = course.detailsLink.trim();
      if (details !== "#" && details !== "javascript:void(0)") {
        return details;
      }
    }
    // 3️⃣ no valid link → image will not be wrapped with anchor
    return null;
  }

  // Helper: returns proper href for details button
  function getDetailsButtonLink(providedLink) {
    return providedLink && providedLink.trim() !== "" ? providedLink : "#";
  }

  // Create a single course card with clickable image (custom redirect) + view details button
  function createCourseCard(course, index) {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'course-card';

    // ---- IMAGE SECTION (potentially wrapped by anchor for custom redirect) ----
    const img = document.createElement('img');
    img.src = getCourseImage(course);
    img.alt = course.title;
    img.loading = 'lazy';
    img.className = 'card-img';
    
    // graceful fallback if custom image fails to load
    img.onerror = function() {
      if (!img.hasAttribute('data-fallback-attempted')) {
        img.setAttribute('data-fallback-attempted', 'true');
        if (course.imageUrl && course.imageUrl.trim() !== "") {
          const safeId = (course.imgId && course.imgId.toString().trim()) ? course.imgId : "100";
          img.src = `https://picsum.photos/id/${safeId}/500/280`;
        } else {
          img.src = "https://picsum.photos/id/1/500/280";
        }
      }
    };

    // determine if image should be clickable with custom redirect
    const imageRedirectUrl = getImageRedirectLink(course);
    let imageWrapper = null;
    
    if (imageRedirectUrl) {
      // wrap image inside an anchor tag with the custom redirect link
      const anchor = document.createElement('a');
      anchor.href = imageRedirectUrl;
      anchor.className = 'image-link';
      // optional: open in same tab (standard behavior) – can be changed if needed
      anchor.target = '_self';
      anchor.setAttribute('aria-label', `View details for ${course.title} (image link)`);
      anchor.appendChild(img);
      imageWrapper = anchor;
    } else {
      // no valid link -> image not clickable
      imageWrapper = img;
    }

    // ---- CONTENT SECTION ----
    const contentDiv = document.createElement('div');
    contentDiv.className = 'card-content';

    const titleEl = document.createElement('h3');
    titleEl.className = 'course-title';
    titleEl.textContent = course.title;

    const descEl = document.createElement('p');
    descEl.className = 'course-description';
    descEl.textContent = course.description;

    const priceEl = document.createElement('div');
    priceEl.className = 'course-price';
    priceEl.innerHTML = `${course.price} <span>INR</span>`;

    // Button group (only View Details)
    const btnGroup = document.createElement('div');
    btnGroup.className = 'button-group';

    const detailsBtn = document.createElement('a');
    detailsBtn.href = getDetailsButtonLink(course.detailsLink);
    detailsBtn.className = 'btn btn-details';
    detailsBtn.textContent = 'View Details';
    detailsBtn.setAttribute('data-course-id', index + 1);
    
    // optional: if detailsLink is empty or "#", make it non-navigable but still styled
    if (!course.detailsLink || course.detailsLink.trim() === "" || course.detailsLink.trim() === "#") {
      // we keep href="#" but prevent default to avoid jumping to top (optional)
      detailsBtn.addEventListener('click', (e) => {
        if (detailsBtn.getAttribute('href') === "#" || !detailsBtn.getAttribute('href') || detailsBtn.getAttribute('href').trim() === "") {
          e.preventDefault();
          // you could show a small toast or nothing, but no navigation
          console.log(`Details link for "${course.title}" is not configured yet.`);
        }
      });
    }

    btnGroup.appendChild(detailsBtn);

    contentDiv.appendChild(titleEl);
    contentDiv.appendChild(descEl);
    contentDiv.appendChild(priceEl);
    contentDiv.appendChild(btnGroup);

    // Assemble card
    cardDiv.appendChild(imageWrapper);
    cardDiv.appendChild(contentDiv);

    return cardDiv;
  }

  // Render all courses with enhanced clickable image logic
  function renderCourses() {
    const container = document.getElementById('coursesGridContainer');
    if (!container) return;
    container.innerHTML = '';

    coursesData.forEach((course, idx) => {
      const card = createCourseCard(course, idx);
      container.appendChild(card);
    });

    // Trigger entrance animation
    requestAnimationFrame(() => {
      container.classList.add('loaded');
    });
  }

  // Initialize on DOM ready
  document.addEventListener('DOMContentLoaded', () => {
    renderCourses();
  });
</script>

<!-- 
  =========================================================================
  ✅ COMPLETE GUIDE: CUSTOM REDIRECT ON IMAGE CLICK (image ko click krne se custom link redirect)
  
  🎯 FEATURE SUMMARY:
     Every course image is now individually clickable. The redirect URL is determined by:
     
     1️⃣ "imageLink" property inside the course object (highest priority).
        Example:  imageLink: "./my-custom-page.html"
     
     2️⃣ If "imageLink" is missing, it automatically uses the "detailsLink" value 
        (same destination as the "View Details" button).
     
     3️⃣ If both are empty / undefined / "#", the image remains non-clickable (no link).
  
  📝 HOW TO SET A CUSTOM IMAGE LINK FOR ANY COURSE:
     - Open the coursesData array.
     - Find the desired course.
     - Add or modify the field:   imageLink: "YOUR_DESIRED_URL"
     
     Example for "UI/UX Design Pro":
        {
          title: "UI/UX Design Pro",
          ...
          imageLink: "https://example.com/ux-portfolio-showcase",
          detailsLink: "./section-ux.html"
        }
     Now clicking the image opens "https://example.com/ux-portfolio-showcase",
     while the button below goes to "./section-ux.html" (different destinations possible).

  💡 ADVANCED USAGE:
     - You can use absolute URLs (https://...), relative paths (./course/deep.html), or anchor links.
     - If you want the image link to open in a new tab, modify the anchor creation inside 
       createCourseCard: change anchor.target = '_blank' (currently _self for standard navigation).
     - Works flawlessly with custom images (imageUrl) and fallback placeholders.

  🖼️ IMAGE REPLACEMENT REMINDER:
     Use "imageUrl": "path/to/your-image.jpg" for custom thumbnails.
     All courses already include a local image example (WhatsApp image), but you can replace 
     any with your own CDN or local asset.

  🔁 ERROR HANDLING:
     - If custom image fails to load, fallback placeholder appears.
     - If image link is broken (404), browser will handle normally – you can replace with valid URL.
     - No interference with existing buttons, prices, or responsive design.

  🚀 FULLY BACKWARD COMPATIBLE:
     Existing courses without "imageLink" will automatically reuse "detailsLink" for image clicks.
     If you want image clicks to go somewhere else, simply add "imageLink".

  =========================================================================
  ADDITIONAL NOTES:
  - Back button link can be changed in the <a class="back-btn-fixed"> tag.
  - Page shows "Alpha" header; you can edit it as needed.
  - All "View Details" buttons work independently; image clicks are separate.
  =========================================================================
-->
</body>
</html>
