<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Quiz Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0c1a;font-family:'Space Grotesk',sans-serif;color:#e2deff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1530;border:1.5px solid #2e2850;border-radius:20px;padding:32px;width:100%;max-width:680px;box-shadow:0 8px 48px rgba(124,92,252,0.15)}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;background:linear-gradient(135deg,#a78bfa,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn{padding:11px 26px;border-radius:10px;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;transition:all .2s}
.btn-primary{background:#7c5cfc;color:#fff}
.btn-primary:hover{background:#a78bfa;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:default;transform:none}
.btn-ghost{background:transparent;color:#7a72a0;border:1.5px solid #2e2850}
.btn-ghost:hover{color:#e2deff;border-color:#a78bfa}
.btn-ghost:disabled{opacity:.3;cursor:default}
.option{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:1.5px solid #2e2850;margin-bottom:9px;cursor:pointer;transition:all .18s;background:rgba(255,255,255,0.02);font-size:.93rem;line-height:1.4}
.option:hover:not(.disabled){border-color:#7c5cfc;background:rgba(124,92,252,0.08)}
.option.correct{border-color:#22d3a0;background:rgba(34,211,160,0.1);color:#22d3a0}
.option.wrong{border-color:#f87171;background:rgba(248,113,113,0.1);color:#f87171}
.option.disabled{cursor:default}
.letter{min-width:32px;height:32px;border-radius:8px;background:#2e2850;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.badge{background:#7c5cfc;color:#fff;border-radius:8px;padding:3px 11px;font-size:.78rem;font-weight:700;display:inline-block}
.src-badge{background:#2e2850;color:#a78bfa;border-radius:6px;padding:2px 9px;font-size:.72rem;font-weight:600;display:inline-block;margin-bottom:12px}
.progress-bar{height:5px;background:#2e2850;border-radius:99px;margin:12px 0 20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c5cfc,#a78bfa);border-radius:99px;transition:width .4s}
.feedback{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:.88rem;font-weight:600}
.feedback.ok{background:rgba(34,211,160,0.1);color:#22d3a0}
.feedback.bad{background:rgba(248,113,113,0.1);color:#f87171}
.nav{display:flex;gap:10px;margin-top:22px;justify-content:space-between;align-items:center}
.score-circle{width:120px;height:120px;border-radius:50%;border:5px solid #7c5cfc;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:20px auto}
.score-num{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:#a78bfa}
.summary-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #2e2850;font-size:.82rem;color:#7a72a0}
.help-row{display:flex;gap:10px;margin-top:12px}
.btn-notes{flex:1;padding:11px 14px;border-radius:10px;border:1.5px solid rgba(255,209,102,0.35);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.84rem;background:rgba(255,209,102,0.08);color:#ffd166;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-notes:hover{background:rgba(255,209,102,0.18);border-color:#ffd166;transform:translateY(-1px)}
.btn-video{flex:1;padding:11px 14px;border-radius:10px;border:1.5px solid rgba(248,113,113,0.3);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.84rem;background:rgba(248,113,113,0.08);color:#f87171;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-video:hover{background:rgba(248,113,113,0.18);border-color:#f87171;transform:translateY(-1px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
.modal{background:#1a1530;border:1.5px solid #2e2850;border-radius:20px;padding:28px;width:100%;max-width:620px;max-height:82vh;overflow-y:auto;position:relative;box-shadow:0 12px 60px rgba(124,92,252,0.3)}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;margin-bottom:5px;padding-right:40px;line-height:1.4}
.modal-sub{color:#7a72a0;font-size:.76rem;margin-bottom:18px}
.modal-close{position:absolute;top:18px;right:18px;background:#2e2850;border:none;color:#e2deff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.85rem;font-family:'Space Grotesk',sans-serif;font-weight:700}
.modal-close:hover{background:#3e3870}
.note-point{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #2e2850;font-size:.9rem;line-height:1.55}
.note-point:last-child{border-bottom:none}
.note-dot{min-width:8px;height:8px;border-radius:50%;background:#a78bfa;margin-top:8px;flex-shrink:0}
</style>
</head>
<body>
<div class="card">
  <div id="quizScreen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span class="badge" id="qBadge">Q 1 / 48</span>
      <span style="color:#7a72a0;font-size:.78rem">📄 nutrition_chapter_1.pdf</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:2%"></div></div>
    <div id="srcBadge" class="src-badge"></div>
    <p style="font-size:1.02rem;line-height:1.6;margin-bottom:18px;font-weight:500" id="qText"></p>
    <div id="optionsDiv"></div>
    <div id="feedbackDiv" class="feedback" style="display:none"></div>
    <div id="helpRow" class="help-row" style="display:none">
      <button class="btn-notes" onclick="openNotes()">📖 PDF Notes</button>
      <button class="btn-video" onclick="openVideo()">▶️ Video Dekho</button>
    </div>
    <div class="nav">
      <button class="btn btn-ghost" id="prevBtn" onclick="prevQ()">⬅️ पिछला</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>अगला ➡️</button>
    </div>
  </div>

  <div id="doneScreen" style="display:none;text-align:center">
    <h1>Result 🎓</h1>
    <div class="score-circle">
      <span class="score-num" id="scoreNum">0/0</span>
      <span style="font-size:.72rem;color:#7a72a0">Score</span>
    </div>
    <p style="color:#7a72a0;margin-bottom:4px" id="scoreMsg"></p>
    <p style="color:#7a72a0;font-size:.82rem;margin-bottom:20px" id="scorePct"></p>
    <div id="summaryDiv" style="text-align:left;margin-bottom:20px;max-height:300px;overflow-y:auto"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-ghost" onclick="restart()">🔁 Dobara Karo</button>
    </div>
  </div>
</div>

<!-- Notes Modal -->
<div id="notesModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeNotes()">
  <div class="modal">
    <button class="modal-close" onclick="closeNotes()">✕ बंद करें</button>
    <div class="modal-title" id="notesTitle" style="color:#ffd166"></div>
    <div class="modal-sub">📖 PDF से मुख्य बिंदु — इस topic को समझो</div>
    <div id="notesBody"></div>
  </div>
</div>

<!-- Video Modal -->
<div id="videoModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeVideo()">
  <div class="modal">
    <button class="modal-close" onclick="closeVideo()">✕ बंद करें</button>
    <div class="modal-title" id="videoTitle" style="color:#f87171"></div>
    <div class="modal-sub">▶️ YouTube पर इस topic का video देखो</div>
    <div id="videoBody"></div>
  </div>
</div>

let current=0, answered={};

function renderQuestion(){
  const q=questions[current], total=questions.length;
  document.getElementById('qBadge').textContent='Q '+(current+1)+' / '+total;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('srcBadge').textContent='📋 '+q.src;
  document.getElementById('progressFill').style.width=(((current+1)/total)*100)+'%';
  document.getElementById('prevBtn').disabled=current===0;
  const isAns=answered[current]!==undefined, ua=answered[current];
  document.getElementById('nextBtn').disabled=!isAns;
  document.getElementById('nextBtn').innerHTML=current===total-1?'🏁 Result Dekho':'अगला ➡️';

  const div=document.getElementById('optionsDiv');
  div.innerHTML='';
  q.options.forEach(opt=>{
    const l=opt.charAt(0).toUpperCase(), isCor=l===q.answer.toUpperCase(), isSel=ua&&ua.charAt(0).toUpperCase()===l;
    let cls='option';
    if(isAns){cls+=' disabled'; if(isCor)cls+=' correct'; else if(isSel)cls+=' wrong';}
    const el=document.createElement('div');
    el.className=cls;
    el.innerHTML=`<span class="letter">${l}</span><span style="flex:1">${opt.slice(2).trim()}</span>`
      +(isAns&&isCor?'<span>✅</span>':'')+(isAns&&isSel&&!isCor?'<span>❌</span>':'');
    if(!isAns)el.addEventListener('click',()=>selectAnswer(opt));
    div.appendChild(el);
  });

  const fb=document.getElementById('feedbackDiv'), hr=document.getElementById('helpRow');
  if(isAns){
    const correct=ua.charAt(0).toUpperCase()===q.answer.toUpperCase();
    fb.style.display='block';
    fb.className='feedback '+(correct?'ok':'bad');
    fb.textContent=correct?'🎉 Sahi jawab!':'❌ Galat! Sahi jawab: '+q.answer.toUpperCase();
    hr.style.display=correct?'none':'flex';
  } else {
    fb.style.display='none';
    hr.style.display='none';
  }
}

function selectAnswer(opt){
  if(answered[current]!==undefined)return;
  answered[current]=opt;
  renderQuestion();
}
function nextQ(){if(current<questions.length-1){current++;renderQuestion();}else showResult();}
function prevQ(){if(current>0){current--;renderQuestion();}}

function openNotes(){
  const q=questions[current], topic=q.topic||'Topic';
  const pts=notes[topic]||['Is topic ke baare mein PDF mein detail maujood hai.'];
  document.getElementById('notesTitle').textContent='📖 '+topic;
  document.getElementById('notesBody').innerHTML=pts.map(p=>
    `<div class="note-point"><span class="note-dot"></span><span>${p}</span></div>`
  ).join('');
  document.getElementById('notesModal').style.display='flex';
}
function closeNotes(){document.getElementById('notesModal').style.display='none';}

function openVideo(){
  const q=questions[current], topic=q.topic||'biology nutrition';
  const query=videoQ[topic]||(topic+' hindi biology RRB');
  const url='https://www.youtube.com/results?search_query='+encodeURIComponent(query);
  document.getElementById('videoTitle').textContent='▶️ '+topic;
  document.getElementById('videoBody').innerHTML=`
    <div style="background:#2e2850;border-radius:14px;padding:22px;text-align:center;margin-bottom:14px">
      <div style="font-size:2.8rem;margin-bottom:10px">🎬</div>
      <p style="font-size:.95rem;color:#a78bfa;font-weight:700;margin-bottom:8px">${topic}</p>
      <p style="font-size:.8rem;color:#7a72a0;margin-bottom:18px">YouTube pe is topic ke detailed videos milenge</p>
      <a href="${url}" target="_blank" style="display:inline-block;padding:12px 28px;background:#f87171;color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:.92rem;letter-spacing:.3px">▶️ YouTube pe Dekho</a>
    </div>
    <div style="background:#1e1a38;border-radius:10px;padding:14px;font-size:.82rem;color:#7a72a0;line-height:1.7">
      🔍 <strong style="color:#a78bfa">YouTube Search:</strong><br>
      <span style="color:#ffd166;font-style:italic">"${query}"</span>
    </div>`;
  document.getElementById('videoModal').style.display='flex';
}
function closeVideo(){document.getElementById('videoModal').style.display='none';}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('doneScreen').style.display='block';
  let score=0;
  questions.forEach((q,i)=>{if((answered[i]||'').charAt(0).toUpperCase()===q.answer.toUpperCase())score++;});
  document.getElementById('scoreNum').textContent=score+'/'+questions.length;
  document.getElementById('scorePct').textContent=Math.round((score/questions.length)*100)+'% correct';
  const msgs=['Ek baar phir practice karo! 🔁','Theek hai, mehnat karo! 📖','Bahut accha! 💪','Kamaal! Sab sahi! 🌟'];
  document.getElementById('scoreMsg').textContent=msgs[score===questions.length?3:score>=questions.length*.7?2:score>=questions.length*.5?1:0];
  const sd=document.getElementById('summaryDiv');
  sd.innerHTML='';
  questions.forEach((q,i)=>{
    const ok=(answered[i]||'').charAt(0).toUpperCase()===q.answer.toUpperCase();
    const el=document.createElement('div');
    el.className='summary-item';
    el.innerHTML=`<span>${ok?'✅':'❌'}</span><span>${i+1}. ${q.q.slice(0,55)}${q.q.length>55?'...':''}</span>`;
    sd.appendChild(el);
  });
}

function restart(){
  current=0;answered={};
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  renderQuestion();
}
renderQuestion();
</script>
</body>
</html>
