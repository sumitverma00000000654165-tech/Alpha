<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Stockflow · Video Library</title>
  <!-- Google Fonts & modern smooth styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
      transition: background 0.25s ease, color 0.2s ease;
      padding: 1.5rem 1.2rem 3rem;
    }

    /* Light / dark theme variables */
    body.dark {
      background: #0b1120;
      color: #e2e8f0;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    body.dark .logo h1 {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .logo p {
      font-size: 0.95rem;
      color: #475569;
      margin-top: 4px;
    }
    body.dark .logo p {
      color: #94a3b8;
    }

    .theme-toggle {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }
    body.dark .theme-toggle {
      background: #1e293b;
      border-color: #334155;
      color: #f1f5f9;
    }
    .theme-toggle:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }
    body.dark .theme-toggle:hover {
      background: #334155;
    }

    /* ----- VIDEO GRID (section-based, no slider) ----- */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem 1.8rem;
    }

    /* Each section = card */
    .video-card {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.07), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      border: 1px solid #f1f5f9;
    }
    body.dark .video-card {
      background: #1e293b;
      border-color: #334155;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
    }
    .video-card:hover {
      box-shadow: 0 30px 45px -12px rgba(0, 35, 80, 0.15);
    }

    /* Video player wrapper — 16:9 */
    .player-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: #0f172a;
      border-radius: 0;
    }
    .player-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: #000;
    }

    /* Video title (optional) */
    .video-title {
      padding: 1.2rem 1.5rem 0.3rem;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
    }
    body.dark .video-title {
      color: #f0f4fe;
    }

    /* ----- BANNER AREA (required, below video, CTA style) ----- */
    .cta-banner {
      margin: 1rem 1.5rem 1.5rem;
      padding: 1.2rem 1.4rem;
      border-radius: 22px;
      background: linear-gradient(105deg, #eef2ff 0%, #f8fafc 100%);
      border: 1px solid #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      transition: background 0.2s, border-color 0.2s;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0.6), 0 6px 12px -6px rgba(0,0,0,0.08);
    }
    body.dark .cta-banner {
      background: linear-gradient(105deg, #1e2a4a 0%, #172032 100%);
      border-color: #2d3a5e;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 6px 14px -6px #00000060;
    }

    /* Banner could have background image — optional via inline style */
    .banner-content {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    .banner-content span {
      font-size: 1rem;
    }
    body.dark .banner-content span {
      color: #cbd5e1;
    }

    /* CTA Button — hover effects, modern */
    .cta-btn {
      background: #1e293b;
      color: white;
      border: none;
      padding: 0.75rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2);
      transition: all 0.25s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      border: 1px solid #ffffff20;
      letter-spacing: 0.3px;
    }
    body.dark .cta-btn {
      background: #3b82f6;
      color: white;
      box-shadow: 0 6px 14px -6px #1e3a8a80;
      border-color: #93c5fd30;
    }
    .cta-btn:hover {
      background: #0f172a;
      transform: translateY(-2px);
      box-shadow: 0 14px 22px -8px #0f172a60;
    }
    body.dark .cta-btn:hover {
      background: #2563eb;
      box-shadow: 0 14px 22px -8px #1e3a8a;
    }
    .cta-btn:active {
      transform: translateY(1px);
      box-shadow: 0 6px 10px -4px #00000040;
    }

    /* Alternative banner style with image bg (we can add one via js if needed) */
    .banner-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    /* Lazy load placeholder (smooth) */
    .lazy-placeholder {
      background: #1e293b;
    }

    /* Responsive fine-tuning */
    @media (max-width: 600px) {
      body { padding: 1rem 0.8rem 2rem; }
      .app-header { margin-bottom: 1.8rem; }
      .logo h1 { font-size: 1.9rem; }
      .video-grid { gap: 1.8rem; }
      .cta-banner { margin: 0.8rem 1rem 1.2rem; padding: 1rem 1.2rem; }
      .video-title { padding: 1rem 1.2rem 0.2rem; }
    }

    /* Footer note */
    .footnote {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
<div class="container">
  <header class="app-header">
    <div class="logo">
    <h1>Alpha</h1>
      <p></p>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Switch theme">
      <span>🌙</span> Dark / Light
    </button>
  </header>

  <!-- Video sections will be injected here as a grid (no slider) -->
  <div id="videoGrid" class="video-grid"></div>
  <div class="footnote">
    
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- THEME TOGGLE (optional light/dark) ----------
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    // Check for saved preference
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });

    // ---------- VIDEO DATA (YouTube URLs only, ID extraction built-in) ----------
    // Each entry: youtubeUrl (full url), title (optional), bannerType ('pdf' or 'link'), 
    // bannerText, actionUrl (pdf or external), optional bannerBg (image/gradient)
    const videoLibrary = [
      
      {
        youtubeUrl: 'https://youtu.be/6hQ2sl_ARog',  // underwater / reef
        title: 'Class 1',
        bannerType: 'link',
        bannerText: '',
        actionUrl: 'https://drive.google.com/file/d/11CS9ht4gzckSMdETn2JrzXlPwL8gHnwN/view?usp=sharing',
        bannerExtra: ''
      },
      
     
       {
        youtubeUrl: 'https://youtu.be/nZ13QlCxWB4',  // underwater / reef
        title: 'Class 2',
        bannerType: 'link',
        bannerText: '',
        actionUrl: '',
        bannerExtra: ''
      },
       {
        youtubeUrl: 'https://youtu.be/9XDm-g-C5sk',  // underwater / reef
        title: 'Class 3',
        bannerType: 'link',
        bannerText: '',
        actionUrl: '',
        bannerExtra: ''
      },
       {
        youtubeUrl: 'https://youtu.be/BoXqj7Qkl68',  // underwater / reef
        title: 'Class 4',
        bannerType: 'link',
        bannerText: '',
        actionUrl: '',
        bannerExtra: ''
      },
       {
        youtubeUrl: 'https://youtu.be/F1uDmU_3a0U',  // underwater / reef
        title: 'Class 5',
        bannerType: 'link',
        bannerText: '',
        actionUrl: '',
        bannerExtra: ''
      },
       {
        youtubeUrl: 'https://youtu.be/BUtts3SlNOA',  // underwater / reef
        title: 'Class 6',
        bannerType: 'link',
        bannerText: '',
        actionUrl: '',
        bannerExtra: ''
      },
      
    ];

    // Helper: extract YouTube ID from various URL formats
    function extractYouTubeId(url) {
      if (!url) return null;
      // Patterns: youtu.be/ID, youtube.com/watch?v=ID, youtube.com/embed/ID, etc.
      const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    // ---------- RENDER SECTIONS (grid) ----------
    const gridContainer = document.getElementById('videoGrid');
    
    function buildVideoCard(videoData) {
      const videoId = extractYouTubeId(videoData.youtubeUrl);
      if (!videoId) {
        console.warn('Invalid YouTube URL:', videoData.youtubeUrl);
        return null;
      }

      // Create card container
      const card = document.createElement('div');
      card.className = 'video-card';

      // ----- Embedded YouTube player (lazy) -----
      const playerWrapper = document.createElement('div');
      playerWrapper.className = 'player-wrapper';
      
      const iframe = document.createElement('iframe');
      // Set data-src for lazy loading, leave src empty until observed
      iframe.setAttribute('data-src', `https://www.youtube.com/embed/${videoId}?autoplay=0&modestbranding=1&rel=0&showinfo=0&color=white&enablejsapi=1`);
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
      iframe.setAttribute('allowfullscreen', '');
      iframe.setAttribute('loading', 'lazy');  // native lazy attribute as fallback
      iframe.setAttribute('title', videoData.title || 'YouTube video');
      // Initially no src (lazy load via IntersectionObserver)
      iframe.src = ''; 
      
      playerWrapper.appendChild(iframe);
      card.appendChild(playerWrapper);

      // Optional title
      if (videoData.title) {
        const titleEl = document.createElement('div');
        titleEl.className = 'video-title';
        titleEl.textContent = videoData.title;
        card.appendChild(titleEl);
      }

      // ----- BANNER AREA (required) with CTA -----
      const banner = document.createElement('div');
      banner.className = 'cta-banner';
      
      // Optional background image / extra style — we can add a subtle inline gradient if wanted
      // but already defined in CSS. We'll add a small icon based on type.
      const bannerContent = document.createElement('div');
      bannerContent.className = 'banner-content';
      
      const iconSpan = document.createElement('span');
      iconSpan.className = 'banner-icon';
      iconSpan.textContent = videoData.bannerType === 'pdf' ? '📄' : '';
      
      const textSpan = document.createElement('span');
      // Use bannerExtra if exists, else default
      const extraText = videoData.bannerExtra || (videoData.bannerType === 'pdf' ? 'PDF resource' : '');
      textSpan.textContent = `${extraText}   `;
      
      bannerContent.appendChild(iconSpan);
      bannerContent.appendChild(textSpan);
      
      // CTA Button
      const ctaLink = document.createElement('a');
      ctaLink.className = 'cta-btn';
      ctaLink.textContent = videoData.bannerText || (videoData.bannerType === 'pdf' ? '📄 View PDF' : 'View Class Notes');
      ctaLink.href = videoData.actionUrl || '#';
      ctaLink.target = '_blank';
      ctaLink.rel = 'noopener noreferrer';
      
      // For PDF, we can also hint but link works
      banner.appendChild(bannerContent);
      banner.appendChild(ctaLink);
      
      // Optional: add a subtle background image via inline style if needed? 
      // We keep CSS gradient. Can be enhanced.
      
      card.appendChild(banner);
      
      // Store iframe reference for lazy loading
      card.dataset.videoId = videoId;
      card.iframeElement = iframe;
      
      return card;
    }

    // Render all cards into grid
    videoLibrary.forEach(item => {
      const card = buildVideoCard(item);
      if (card) {
        gridContainer.appendChild(card);
      }
    });

    // ---------- LAZY LOAD YOUTUBE IFRAMES (Intersection Observer) ----------
    const iframesToLoad = [];
    const cards = document.querySelectorAll('.video-card');
    
    cards.forEach(card => {
      const iframe = card.querySelector('iframe');
      if (iframe && iframe.dataset.src) {
        iframesToLoad.push({ card, iframe, dataSrc: iframe.dataset.src });
      }
    });

    if (iframesToLoad.length > 0) {
      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const targetCard = entry.target;
            const iframe = targetCard.querySelector('iframe');
            if (iframe && iframe.dataset.src) {
              // Set src to trigger loading
              iframe.src = iframe.dataset.src;
              // Remove data-src to avoid reset
              iframe.removeAttribute('data-src');
            }
            // Stop observing this card
            obs.unobserve(targetCard);
          }
        });
      }, { 
        rootMargin: '200px 0px',  // start loading a bit before they appear
        threshold: 0.01 
      });

      cards.forEach(card => observer.observe(card));
    }

    // Edge case: if any iframe hasn't loaded after 2 seconds (maybe already visible), force load
    setTimeout(() => {
      document.querySelectorAll('.video-card iframe[data-src]').forEach(iframe => {
        const rect = iframe.getBoundingClientRect();
        if (rect.top < window.innerHeight + 300 && rect.bottom > -300) {
          iframe.src = iframe.dataset.src;
          iframe.removeAttribute('data-src');
        }
      });
    }, 800);

    // Also for any card that might be missed, we can attach a scroll listener (once)
    // But IntersectionObserver is enough.

    // Bonus: small enhancement – ensure CTA hover works smooth
    // all set.

    // Add a tiny extra: for demonstration, the banner background could be slightly varied per card?
    // Not required, but we can set a custom property.
    // (optional) We'll keep as is — clean and modern.

    // Additional: Ensure banner "View PDF" or "Visit Destination" opens in new tab.
    // Already implemented.

    console.log('✅ Video stock library ready — sections, no slider, lazy YouTube, banner CTA.');
  })();
</script>

<!-- small extra style for better banner image optional (we can use an additional class if needed) -->
<style>
  /* fine tune banner extra hover */
  .cta-banner {
    backdrop-filter: blur(2px);
  }
  body.dark .cta-banner {
    backdrop-filter: blur(4px);
  }
  /* make iframe background while loading */
  .player-wrapper {
    background: #0b1324;
  }
  body.dark .player-wrapper {
    background: #020617;
  }
  /* smooth transition for card */
  .video-card {
    transition: all 0.25s;
  }
  /* ensure banner CTA has pointer */
  .cta-btn {
    cursor: pointer;
  }
  /* optional badge for banner */
  .banner-content span:last-child {
    font-weight: 500;
  }
</style>
</body>
</html>
